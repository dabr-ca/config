# Roughly based on: https://docs-develop.pleroma.social/backend/installation/otp_en/

- name: gather EC2 metadata
  amazon.aws.ec2_metadata_facts:

- name: install packages
  apt:
    name:
      - curl
      - libncurses6
      - libmagic-dev
      - imagemagick
      - ffmpeg
      - libimage-exiftool-perl
      - libvips42 # undocumented dep for Pleroma 2.9
    update_cache: true

- name: add user
  user:
    name: pleroma
    shell: /bin/bash
    home: "{{ pleroma_home }}"
    system: true

- name: download Pleroma release
  get_url:
    url: "{{ pleroma_tarball_url }}"
    dest: /opt/pleroma.tgz
    mode: 0644
    checksum: "{{ pleroma_tarball_checksum }}"

- name: extract Pleroma release
  unarchive:
    src: /opt/pleroma.tgz
    dest: "{{ pleroma_home }}"
    remote_src: true
    creates: "{{ pleroma_home }}/OTP_VERSION"
    owner: pleroma
    group: pleroma

- name: creat dirs
  file:
    path: "{{ item }}"
    state: directory
    owner: pleroma
    group: pleroma
    mode: 0755
  with_items:
    - "{{ pleroma_data }}"
    - "{{ pleroma_config }}"

- name: read Pleroma secret config from SSM
  set_fact:
    pleroma_secret_exs: "{{ lookup('aws_ssm', pleroma_secret_exs_ssm_parameter, decrypt=true, on_missing='skip', on_denied='error') }}"
  no_log: true

- name: restore Pleroma secret config from SSM
  copy:
    content: "{{ pleroma_secret_exs }}"
    dest: "{{ pleroma_data }}/secret.exs"
    owner: pleroma
    group: pleroma
    mode: '0600'
  when: pleroma_secret_exs | default('', true) | length > 0
  no_log: true

# https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/UsingWithRDS.SSL.html#UsingWithRDS.SSL.CertificatesDownload
- name: download RDS cert
  get_url:
    url: "https://truststore.pki.rds.amazonaws.com/{{ ansible_ec2_placement_region }}/{{ ansible_ec2_placement_region }}-bundle.pem"
    dest: "{{ rds_bundle_path }}"
    mode: 0644
    checksum: "sha256:733b52e4b589586377e3e00f7c4625b61e14cbf0b5e08cace28b4f8aecc27c66"

- name: render config file
  template:
    src: config.exs.j2
    dest: "{{ pleroma_config }}/config.exs"
    owner: pleroma
    group: pleroma
    mode: 0600

- name: render systemd service unit
  template:
    src: pleroma.service.j2
    dest: /etc/systemd/system/pleroma.service
    mode: 0644

- name: enable the service
  systemd:
    name: pleroma
    enabled: true
    daemon_reload: true

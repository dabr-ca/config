- name: Remove snapd
  ansible.builtin.apt:
    name: snapd
    state: absent
    purge: true

- name: Remove snapd leftovers, if any
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  with_items:
    - /snap
    - /var/snap
    - /usr/lib/snapd
    - /var/lib/snapd
    - /var/cache/snapd
    - /home/ubuntu/snap
    - /root/snap

- name: Ensure snapd never gets automatically installed
  ansible.builtin.copy:
    src: no-snap.pref
    dest: /etc/apt/preferences.d/no-snap.pref
    mode: '0644'

- name: Prevent recommendation packages from being installed
  ansible.builtin.copy:
    content: 'APT::Install-Recommends "false";'
    dest: /etc/apt/apt.conf.d/99norecommends
    mode: '0644'

- name: Disable automatic apt actions
  ansible.builtin.copy:
    content: |
      APT::Periodic::Update-Package-Lists "0";
      APT::Periodic::Download-Upgradeable-Packages "0";
      APT::Periodic::Unattended-Upgrade "0";
      APT::Periodic::AutocleanInterval "0";
    dest: /etc/apt/apt.conf.d/99disable-automatic-apt
    mode: '0644'

- name: Disable unattended apt timers
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
    masked: true
  loop:
    - apt-daily.timer
    - apt-daily-upgrade.timer
    - unattended-upgrades.service

- name: Remove unused packages
  ansible.builtin.apt:
    name: "{{ item }}"
    state: absent
    purge: true
  with_items:
    - at
    - ubuntu-advantage-tools
    - accountsservice
    - multipath-tools
    - udisks2
    - lxd-agent-loader
    - modemmanager
    - irqbalance
    - fwupd

- name: Clean unneeded packages
  ansible.builtin.apt:
    autoremove: true
    purge: true

- name: Install tmux config
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/wzyboy/dotfiles/master/.tmux.conf
    dest: /home/ubuntu/.tmux.conf
    owner: ubuntu
    group: ubuntu
    mode: '0644'
